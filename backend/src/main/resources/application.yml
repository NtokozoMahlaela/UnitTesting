server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:sa-id-validator}
  main:
    allow-circular-references: true
  security:
    user:
      name: user
      password: password
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sa_id_validator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Ntokz@084}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  cache:
    type: none

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    contexts: default

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:bXlTZWNyZXRLZXlGb3JKVFRUb2tlblZhbGlkYXRpb24xMjM0NTY3ODkw}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging Configuration
logging:
  level:
    com.validator: ${LOG_LEVEL:INFO}
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:logs/sa-id-validator.log}
    max-size: ${LOG_MAX_SIZE:10MB}
    max-history: ${LOG_MAX_HISTORY:30}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info,metrics,prometheus,loggers}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}
  metrics:
    export:
      prometheus:
        enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: ${API_DOCS_PATH:/api-docs}
  swagger-ui:
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}
    operations-sorter: method
    tags-sorter: alpha

# Application-specific properties
app:
  validation:
    cache:
      enabled: ${CACHE_ENABLED:true}
      ttl: ${CACHE_TTL:3600000}
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:100}
    analytics:
      enabled: ${ANALYTICS_ENABLED:true}
      retention-days: ${ANALYTICS_RETENTION_DAYS:365}
